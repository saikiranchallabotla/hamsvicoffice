<!-- Specification tooltip - shows item description on hover over item name text -->
<style>
.spec-tip {
    display: none;
    position: fixed;
    z-index: 99999;
    max-width: 350px;
    padding: 6px 10px;
    background: #fff;
    color: #1e293b;
    border: 1px solid #e2e8f0;
    border-radius: 4px;
    font-size: 0.78rem;
    line-height: 1.4;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    pointer-events: none;
    word-wrap: break-word;
}
</style>
<div class="spec-tip" id="specTip"></div>
<script>
(function() {
    var tip = document.getElementById('specTip');
    var timer = null;
    document.addEventListener('mouseover', function(e) {
        var el = e.target.closest('[data-spec]');
        if (!el) return;
        var spec = el.getAttribute('data-spec');
        if (!spec) return;
        clearTimeout(timer);
        timer = setTimeout(function() {
            tip.textContent = spec;
            tip.style.display = 'block';
            pos(e);
        }, 250);
    });
    document.addEventListener('mousemove', function(e) {
        if (tip.style.display === 'block') pos(e);
    });
    document.addEventListener('mouseout', function(e) {
        if (e.target.closest('[data-spec]')) { clearTimeout(timer); tip.style.display = 'none'; }
    });
    function pos(e) {
        var x = e.clientX + 10, y = e.clientY + 14;
        if (x + tip.offsetWidth > window.innerWidth - 8) x = e.clientX - tip.offsetWidth - 10;
        if (y + tip.offsetHeight > window.innerHeight - 8) y = e.clientY - tip.offsetHeight - 10;
        tip.style.left = x + 'px';
        tip.style.top = y + 'px';
    }
})();
</script>
