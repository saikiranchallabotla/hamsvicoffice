{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Error - Hamsvic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #fef2f2 0%, #fff1f2 50%, #fce7f3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .error-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            max-width: 440px;
            width: 100%;
            text-align: center;
            overflow: hidden;
        }
        .error-header {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            padding: 2.5rem 2rem 2rem;
        }
        .error-icon {
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
        }
        .error-icon i { font-size: 2.5rem; color: white; }
        .error-header h1 { color: white; font-size: 1.4rem; font-weight: 700; }
        .error-body { padding: 2rem; }
        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            color: #991b1b;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .error-actions { display: flex; flex-direction: column; gap: 0.75rem; }
        .btn-back {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white; border: none; border-radius: 12px;
            font-weight: 600; font-size: 0.95rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-back:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); color: white; }
        .btn-close-tab {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            background: #f1f5f9; color: #475569;
            border: none; border-radius: 12px;
            font-weight: 500; font-size: 0.9rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-close-tab:hover { background: #e2e8f0; color: #334155; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-header">
            <div class="error-icon">
                <i class="bi bi-download"></i>
            </div>
            <h1>{{ error_title|default:"Download Failed" }}</h1>
        </div>
        <div class="error-body">
            <div class="error-msg">
                {{ error_message|default:"Something went wrong while preparing your download. Please try again." }}
            </div>
            <div class="error-actions">
                <button class="btn-back" onclick="window.close(); window.location.href='/dashboard/';">
                    <i class="bi bi-house"></i> Go to Dashboard
                </button>
                <button class="btn-close-tab" onclick="window.close();">
                    <i class="bi bi-x-lg"></i> Close This Tab
                </button>
            </div>
        </div>
    </div>
</body>
</html>
