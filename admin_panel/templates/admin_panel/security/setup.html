{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Up Admin Panel Password - Hamsvic</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .setup-card {
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            width: 100%;
            max-width: 480px;
            padding: 2rem;
        }
        .setup-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin: 0 auto 1rem;
        }
        h1 { font-size: 1.35rem; font-weight: 700; text-align: center; margin: 0 0 .25rem; color: #0f172a; }
        .subtitle { text-align: center; color: #64748b; font-size: .9rem; margin-bottom: 1.5rem; }
        .form-label { font-weight: 500; font-size: .85rem; color: #334155; }
        .helper { font-size: .8rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="setup-card">
        <div class="setup-icon"><i class="bi bi-key-fill"></i></div>
        <h1>Set Up Admin Panel Password</h1>
        <p class="subtitle">
            One-time setup. This password will be required to access the admin
            panel after logging in.
        </p>

        {% if error %}
            <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}

        <form method="post" autocomplete="off">
            {% csrf_token %}
            <div class="mb-3">
                <label for="new_password" class="form-label">New password</label>
                <input
                    type="password"
                    class="form-control"
                    id="new_password"
                    name="new_password"
                    minlength="{{ min_length }}"
                    required
                    autofocus
                >
                <div class="helper mt-1">Minimum {{ min_length }} characters.</div>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirm password</label>
                <input
                    type="password"
                    class="form-control"
                    id="confirm_password"
                    name="confirm_password"
                    minlength="{{ min_length }}"
                    required
                >
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-shield-check me-1"></i> Save and Unlock
            </button>
        </form>
    </div>
</body>
</html>
