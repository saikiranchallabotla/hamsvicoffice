<!-- Custom Confirm/Prompt Modal - replaces native browser dialogs -->
<div id="appModalOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:99990; align-items:center; justify-content:center;">
    <div id="appModalBox" style="background:white; border-radius:16px; padding:32px; max-width:420px; width:90%; text-align:center; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); transform:scale(0.95); opacity:0; transition:transform 0.2s ease-out, opacity 0.2s ease-out;">
        <div id="appModalIcon" style="width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; background:#fef3c7;">
            <i class="bi bi-exclamation-triangle" style="font-size:24px; color:#f59e0b;"></i>
        </div>
        <h4 id="appModalTitle" style="margin:0 0 8px; color:#1e293b; font-weight:600; font-size:1.15rem;">Confirm</h4>
        <p id="appModalMessage" style="margin:0 0 24px; color:#64748b; line-height:1.6; font-size:0.95rem;"></p>
        <div id="appModalInputWrap" style="display:none; margin-bottom:20px;">
            <input type="text" id="appModalInput" style="width:100%; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:0.95rem; outline:none; transition:border-color 0.2s; font-family:inherit;">
        </div>
        <div style="display:flex; gap:12px;">
            <button id="appModalCancel" type="button" style="flex:1; padding:10px 20px; border:1.5px solid #e2e8f0; background:white; border-radius:10px; font-weight:500; cursor:pointer; color:#64748b; transition:all 0.2s; font-family:inherit; font-size:0.95rem;">Cancel</button>
            <button id="appModalOk" type="button" style="flex:1; padding:10px 20px; border:none; background:#3b82f6; color:white; border-radius:10px; font-weight:500; cursor:pointer; transition:all 0.2s; font-family:inherit; font-size:0.95rem;">OK</button>
        </div>
    </div>
</div>
<script>
(function() {
    var overlay = document.getElementById('appModalOverlay');
    var modalBox = document.getElementById('appModalBox');
    var modalTitle = document.getElementById('appModalTitle');
    var modalMsg = document.getElementById('appModalMessage');
    var inputWrap = document.getElementById('appModalInputWrap');
    var inputEl = document.getElementById('appModalInput');
    var okBtn = document.getElementById('appModalOk');
    var cancelBtn = document.getElementById('appModalCancel');
    var iconDiv = document.getElementById('appModalIcon');

    function showModal() {
        overlay.style.display = 'flex';
        setTimeout(function() {
            modalBox.style.transform = 'scale(1)';
            modalBox.style.opacity = '1';
        }, 10);
    }

    function hideModal() {
        modalBox.style.transform = 'scale(0.95)';
        modalBox.style.opacity = '0';
        setTimeout(function() { overlay.style.display = 'none'; }, 200);
    }

    var iconMap = {
        warning: { bg: '#fef3c7', color: '#f59e0b', icon: 'bi-exclamation-triangle' },
        danger:  { bg: '#fee2e2', color: '#ef4444', icon: 'bi-trash' },
        info:    { bg: '#dbeafe', color: '#3b82f6', icon: 'bi-info-circle' },
        edit:    { bg: '#dbeafe', color: '#3b82f6', icon: 'bi-pencil-square' }
    };

    // Accessible focus management
    inputEl.addEventListener('focus', function() { this.style.borderColor = '#3b82f6'; });
    inputEl.addEventListener('blur', function() { this.style.borderColor = '#e2e8f0'; });

    window.appConfirm = function(message, title, options) {
        return new Promise(function(resolve) {
            var opts = options || {};
            var type = opts.type || 'warning';
            var ic = iconMap[type] || iconMap.warning;

            modalTitle.textContent = title || 'Confirm';
            modalMsg.textContent = message;
            inputWrap.style.display = 'none';
            iconDiv.style.background = ic.bg;
            iconDiv.innerHTML = '<i class="bi ' + ic.icon + '" style="font-size:24px; color:' + ic.color + ';"></i>';

            if (opts.danger) {
                okBtn.style.background = '#ef4444';
                okBtn.onmouseover = function() { okBtn.style.background = '#dc2626'; };
                okBtn.onmouseout = function() { okBtn.style.background = '#ef4444'; };
            } else {
                okBtn.style.background = '#3b82f6';
                okBtn.onmouseover = function() { okBtn.style.background = '#2563eb'; };
                okBtn.onmouseout = function() { okBtn.style.background = '#3b82f6'; };
            }
            okBtn.textContent = opts.okText || 'OK';
            cancelBtn.textContent = opts.cancelText || 'Cancel';

            showModal();
            okBtn.focus();

            function cleanup() {
                hideModal();
                okBtn.onclick = null;
                cancelBtn.onclick = null;
                overlay.onclick = null;
                document.removeEventListener('keydown', onKey);
            }
            function onKey(e) {
                if (e.key === 'Escape') { cleanup(); resolve(false); }
                if (e.key === 'Enter') { cleanup(); resolve(true); }
            }
            document.addEventListener('keydown', onKey);
            okBtn.onclick = function() { cleanup(); resolve(true); };
            cancelBtn.onclick = function() { cleanup(); resolve(false); };
            overlay.onclick = function(e) { if (e.target === overlay) { cleanup(); resolve(false); } };
        });
    };

    window.appPrompt = function(message, title, defaultValue) {
        return new Promise(function(resolve) {
            modalTitle.textContent = title || 'Input Required';
            modalMsg.textContent = message;
            inputWrap.style.display = 'block';
            inputEl.value = defaultValue || '';
            iconDiv.style.background = iconMap.edit.bg;
            iconDiv.innerHTML = '<i class="bi ' + iconMap.edit.icon + '" style="font-size:24px; color:' + iconMap.edit.color + ';"></i>';
            okBtn.style.background = '#3b82f6';
            okBtn.onmouseover = function() { okBtn.style.background = '#2563eb'; };
            okBtn.onmouseout = function() { okBtn.style.background = '#3b82f6'; };
            okBtn.textContent = 'OK';
            cancelBtn.textContent = 'Cancel';

            showModal();
            setTimeout(function() { inputEl.focus(); }, 100);

            function cleanup() {
                hideModal();
                okBtn.onclick = null;
                cancelBtn.onclick = null;
                overlay.onclick = null;
                inputEl.onkeydown = null;
                document.removeEventListener('keydown', onKey);
            }
            function onKey(e) {
                if (e.key === 'Escape') { cleanup(); resolve(null); }
            }
            document.addEventListener('keydown', onKey);
            okBtn.onclick = function() { cleanup(); resolve(inputEl.value); };
            cancelBtn.onclick = function() { cleanup(); resolve(null); };
            overlay.onclick = function(e) { if (e.target === overlay) { cleanup(); resolve(null); } };
            inputEl.onkeydown = function(e) { if (e.key === 'Enter') { e.preventDefault(); cleanup(); resolve(inputEl.value); } };
        });
    };

    // Delegated handler for data-confirm on buttons/links
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('[data-confirm]');
        if (!btn) return;
        // Skip if inside a form with data-confirm (handled by submit handler)
        var parentForm = btn.closest('form[data-confirm]');
        if (parentForm && btn !== parentForm) return;

        e.preventDefault();
        e.stopPropagation();

        var message = btn.getAttribute('data-confirm');
        var title = btn.getAttribute('data-confirm-title') || 'Confirm';
        var isDanger = btn.classList.contains('btn-danger') || btn.classList.contains('btn-outline-danger');

        appConfirm(message, title, {
            type: isDanger ? 'danger' : 'warning',
            danger: isDanger,
            okText: isDanger ? 'Yes, proceed' : 'OK'
        }).then(function(ok) {
            if (!ok) return;
            // If it's a submit button inside a form
            var form = btn.closest('form');
            if (form && (btn.type === 'submit' || (btn.tagName === 'BUTTON' && !btn.type) || btn.tagName === 'INPUT')) {
                // Temporarily remove data-confirm to avoid re-triggering
                var msg = btn.getAttribute('data-confirm');
                btn.removeAttribute('data-confirm');
                btn.click();
                setTimeout(function() { btn.setAttribute('data-confirm', msg); }, 100);
                return;
            }
            // If it's a link
            if (btn.tagName === 'A' && btn.href) {
                window.location.href = btn.href;
                return;
            }
        });
    }, true);

    // Delegated handler for data-confirm on forms (onsubmit replacement)
    document.addEventListener('submit', function(e) {
        var form = e.target;
        if (!form.hasAttribute('data-confirm')) return;

        e.preventDefault();
        e.stopPropagation();

        var message = form.getAttribute('data-confirm');
        var title = form.getAttribute('data-confirm-title') || 'Confirm';

        appConfirm(message, title, {
            type: 'danger',
            danger: true,
            okText: 'Yes, proceed'
        }).then(function(ok) {
            if (!ok) return;
            var msg = form.getAttribute('data-confirm');
            form.removeAttribute('data-confirm');
            form.submit();
            setTimeout(function() { form.setAttribute('data-confirm', msg); }, 100);
        });
    }, true);
})();
</script>
